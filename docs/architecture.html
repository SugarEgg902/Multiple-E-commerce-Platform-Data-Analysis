<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M_P_Agent — 架构图</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --text:#e2e8f0;--muted:#8892a4;--accent:#6366f1;
  --layer-frontend:#6366f1;--layer-presentation:#0ea5e9;
  --layer-application:#10b981;--layer-domain:#f59e0b;
  --layer-infrastructure:#ef4444;--layer-config:#8b5cf6;
  --radius:10px;--transition:0.18s ease;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── Layout ── */
.shell{display:grid;grid-template-columns:220px 1fr 320px;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:.02em}
.topbar .sub{color:var(--muted);font-size:12px}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0}
.main{overflow-y:auto;padding:20px}
.detail{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:20px}

/* ── Sidebar nav ── */
.nav-section{padding:4px 16px 8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;border-left:3px solid transparent;transition:background var(--transition),border-color var(--transition)}
.nav-item:hover{background:var(--surface2)}
.nav-item.active{background:var(--surface2);border-left-color:var(--accent)}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-item span{font-size:13px}

/* ── Layer cards ── */
.layer{margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.layer-header{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none}
.layer-header:hover{filter:brightness(1.1)}
.layer-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.12)}
.layer-label{font-size:12px;color:rgba(255,255,255,.7)}
.layer-toggle{margin-left:auto;font-size:16px;transition:transform var(--transition)}
.layer.collapsed .layer-toggle{transform:rotate(-90deg)}
.layer-body{padding:12px;display:flex;flex-wrap:wrap;gap:10px;background:var(--surface)}
.layer.collapsed .layer-body{display:none}

/* ── Component cards ── */
.comp{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color var(--transition),transform var(--transition);min-width:140px;max-width:200px;flex:1}
.comp:hover{border-color:var(--accent);transform:translateY(-1px)}
.comp.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(99,102,241,.25)}
.comp-name{font-size:13px;font-weight:600;margin-bottom:3px}
.comp-type{font-size:11px;padding:1px 6px;border-radius:3px;display:inline-block;margin-bottom:5px;background:rgba(255,255,255,.08);color:var(--muted)}
.comp-desc{font-size:11px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── Detail panel ── */
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:8px}
.detail-empty .icon{font-size:32px}
.detail-title{font-size:16px;font-weight:700;margin-bottom:4px}
.detail-path{font-size:11px;color:var(--muted);margin-bottom:14px;font-family:monospace}
.detail-desc{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.detail-section{margin-bottom:14px}
.detail-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.tag-list{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);font-family:monospace}
.tag.highlight{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.endpoint-list{list-style:none}
.endpoint-list li{font-size:11px;font-family:monospace;padding:3px 0;border-bottom:1px solid var(--border);color:var(--muted)}
.endpoint-list li:last-child{border-bottom:none}

/* ── Data flow section ── */
.section-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:3px;height:18px;background:var(--accent);border-radius:2px}
.flow-list{list-style:none;position:relative;padding-left:28px}
.flow-list::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border)}
.flow-item{position:relative;margin-bottom:10px}
.flow-item::before{content:attr(data-step);position:absolute;left:-28px;top:2px;width:20px;height:20px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.flow-item.sse::before{background:rgba(99,102,241,.2);border-color:var(--accent);color:#a5b4fc}
.flow-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.flow-route{font-size:12px;font-weight:600;margin-bottom:2px}
.flow-action{font-size:11px;color:var(--muted);font-family:monospace}
.flow-proto{font-size:10px;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.proto-http{background:rgba(16,185,129,.15);color:#6ee7b7}
.proto-sse{background:rgba(99,102,241,.15);color:#a5b4fc}
.proto-https{background:rgba(245,158,11,.15);color:#fcd34d}
.proto-internal{background:rgba(100,116,139,.15);color:#94a3b8}

/* ── Platforms table ── */
.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
.platform-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.platform-name{font-size:13px;font-weight:700;margin-bottom:4px}
.platform-meta{font-size:11px;color:var(--muted);line-height:1.6}
.platform-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;margin-top:4px}
.badge-apify{background:rgba(245,158,11,.15);color:#fcd34d}
.badge-playwright{background:rgba(16,185,129,.15);color:#6ee7b7}
.badge-httpx{background:rgba(14,165,233,.15);color:#7dd3fc}

/* ── External services ── */
.ext-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ext-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px}
.ext-name{font-size:13px;font-weight:700;margin-bottom:4px}
.ext-model{font-size:11px;font-family:monospace;color:#a5b4fc;margin-bottom:4px}
.ext-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* ── SSE events ── */
.sse-grid{display:flex;flex-wrap:wrap;gap:8px}
.sse-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;min-width:140px}
.sse-type{font-size:12px;font-weight:700;font-family:monospace;color:#a5b4fc;margin-bottom:3px}
.sse-desc{font-size:11px;color:var(--muted)}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--surface);border-radius:8px;padding:3px;width:fit-content}
.tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:background var(--transition),color var(--transition)}
.tab.active{background:var(--surface2);color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="shell">

<!-- Top bar -->
<header class="topbar">
  <div>
    <h1>M_P_Agent</h1>
  </div>
  <span class="sub">多平台电商竞品分析 Agent — 架构图</span>
</header>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar"></nav>

<!-- Main content -->
<main class="main" id="main">
  <div class="tabs">
    <div class="tab active" data-tab="arch">架构层</div>
    <div class="tab" data-tab="flow">数据流</div>

    <div class="tab" data-tab="services">外部服务</div>

</main>

<!-- Detail panel -->
<aside class="detail" id="detail">

  </div>
</aside>

</div>

<script>
// ── Render sidebar ──
const sidebar = document.getElementById('sidebar');
function renderSidebar() {
  let html = '<div class="nav-section">架构层</div>';
  ARCH.layers.forEach(layer => {
    html += `<div class="nav-item" data-layer="${layer.id}" onclick="scrollToLayer('${layer.id}')">
      <div class="nav-dot" style="background:${layer.color}"></div>
      <span>${layer.name}</span>
    </div>`;
  });
  html += '<div class="nav-section" style="margin-top:12px">视图</div>';
  ['arch','flow','platforms','services'].forEach((t,i) => {
    const labels = ['架构层','数据流','平台','外部服务'];
    html += `<div class="nav-item" onclick="switchTab('${t}')"><span>${labels[i]}</span></div>`;
  });
  sidebar.innerHTML = html;
}

// ── Render architecture tab ──
function renderArch() {
  const container = document.getElementById('tab-arch');
  let html = '';
  ARCH.layers.forEach(layer => {
    html += `<div class="layer" id="layer-${layer.id}">
      <div class="layer-header" style="background:${layer.color}22;border-bottom:1px solid ${layer.color}44" onclick="toggleLayer('${layer.id}')">
        <div class="nav-dot" style="background:${layer.color}"></div>
        <span class="layer-badge" style="background:${layer.color}33;color:${layer.color}">${layer.name}</span>
        <span class="layer-label">${layer.label} &nbsp;·&nbsp; ${layer.path}</span>
        <span class="layer-toggle">▾</span>
      </div>
      <div class="layer-body">`;
    layer.components.forEach(comp => {
      html += `<div class="comp" id="comp-${comp.id}" onclick="selectComp('${layer.id}','${comp.id}')">
        <div class="comp-name">${comp.name}</div>
        <div class="comp-type">${comp.type}</div>
        <div class="comp-desc">${comp.description}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

// ── Render data flow tab ──
function renderFlow() {
  const container = document.getElementById('tab-flow');
  const protoClass = {HTTP:'proto-http',SSE:'proto-sse',HTTPS:'proto-https',internal:'proto-internal','HTTPS/Browser':'proto-https'};
  let html = `<div class="section-title">请求生命周期</div>
    <ul class="flow-list">`;
  ARCH.dataFlow.forEach(f => {
    const isSSE = f.protocol === 'SSE';
    const pc = protoClass[f.protocol] || 'proto-internal';
    html += `<li class="flow-item${isSSE?' sse':''}" data-step="${f.step}">
      <div class="flow-card">
        <div class="flow-route">${f.from} → ${f.to}
          <span class="flow-proto ${pc}">${f.protocol}</span>
        </div>
        <div class="flow-action">${f.action}</div>
      </div>
    </li>`;
  });
  html += `</ul>
    <div class="section-title" style="margin-top:28px">SSE 事件类型</div>
    <div class="sse-grid">`;
  ARCH.sseEventTypes.forEach(e => {
    html += `<div class="sse-card">
      <div class="sse-type">${e.type}</div>
      <div class="sse-desc">${e.description}</div>
    </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

// ── Render platforms tab ──
function renderPlatforms() {
  const container = document.getElementById('tab-platforms');
  let html = `<div class="section-title">支持平台（${ARCH.platforms.length} 个）</div>
    <div class="platform-grid">`;
  ARCH.platforms.forEach(p => {
    const badgeClass = p.apify ? 'badge-apify' : (p.method.includes('httpx') ? 'badge-httpx' : 'badge-playwright');
    const badgeLabel = p.apify ? 'Apify' : (p.method.includes('httpx') ? 'httpx' : 'Playwright');
    html += `<div class="platform-card">
      <div class="platform-name">${p.name}</div>
      <div class="platform-meta">
        地区：${p.region}<br>
        货币：${p.currency}<br>
        文件：${p.scraper}
      </div>
      <span class="platform-badge ${badgeClass}">${badgeLabel}</span>
    </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

// ── Render external services tab ──
function renderServices() {
  const container = document.getElementById('tab-services');
  let html = `<div class="section-title">外部服务</div><div class="ext-grid">`;
  ARCH.externalServices.forEach(s => {
    const actors = s.actors ? Object.entries(s.actors).map(([k,v])=>`${k}: ${v}`).join('<br>') : '';
    html += `<div class="ext-card">
      <div class="ext-name">${s.name}</div>
      ${s.model ? `<div class="ext-model">${s.model}</div>` : ''}
      <div class="ext-desc">${s.description}</div>
      ${actors ? `<div class="ext-desc" style="margin-top:6px;font-family:monospace;font-size:10px">${actors}</div>` : ''}
    </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

// ── Detail panel ──
let selectedComp = null;
function selectComp(layerId, compId) {
  if (selectedComp) {
    const prev = document.getElementById('comp-' + selectedComp);
    if (prev) prev.classList.remove('selected');
  }
  selectedComp = compId;
  const el = document.getElementById('comp-' + compId);
  if (el) el.classList.add('selected');

  const layer = ARCH.layers.find(l => l.id === layerId);
  const comp = layer && layer.components.find(c => c.id === compId);
  if (!comp) return;

  const detail = document.getElementById('detail');
  let html = `<div class="detail-title">${comp.name}</div>
    <div class="detail-path">${comp.path || ''}</div>
    <div class="detail-desc">${comp.description}</div>`;

  if (comp.type) {
    html += `<div class="detail-section">
      <div class="detail-section-title">类型</div>
      <div class="tag-list"><span class="tag">${comp.type}</span></div>
    </div>`;
  }
  if (comp.llm) {
    html += `<div class="detail-section">
      <div class="detail-section-title">LLM</div>
      <div class="tag-list"><span class="tag highlight">${comp.llm}</span></div>
    </div>`;
  }
  if (comp.method) {
    html += `<div class="detail-section">
      <div class="detail-section-title">抓取方式</div>
      <div class="tag-list"><span class="tag">${comp.method}</span></div>
    </div>`;
  }
  if (comp.currency) {
    html += `<div class="detail-section">
      <div class="detail-section-title">货币</div>
      <div class="tag-list"><span class="tag">${comp.currency}</span></div>
    </div>`;
  }
  if (comp.retryStrategy) {
    html += `<div class="detail-section">
      <div class="detail-section-title">重试策略</div>
      <div class="tag-list"><span class="tag">${comp.retryStrategy}</span></div>
    </div>`;
  }
  if (comp.actorId) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Apify Actor ID</div>
      <div class="tag-list"><span class="tag highlight">${comp.actorId}</span></div>
    </div>`;
  }
  if (comp.endpoints) {
    html += `<div class="detail-section">
      <div class="detail-section-title">API 端点</div>
      <ul class="endpoint-list">`;
    comp.endpoints.forEach(e => { html += `<li>${e}</li>`; });
    html += `</ul></div>`;
  }
  if (comp.keyFunctions) {
    html += `<div class="detail-section">
      <div class="detail-section-title">关键函数</div>
      <div class="tag-list">`;
    comp.keyFunctions.forEach(f => { html += `<span class="tag">${f}</span>`; });
    html += `</div></div>`;
  }
  if (comp.keyClasses) {
    html += `<div class="detail-section">
      <div class="detail-section-title">关键类</div>
      <div class="tag-list">`;
    comp.keyClasses.forEach(c => { html += `<span class="tag">${c}</span>`; });
    html += `</div></div>`;
  }
  if (comp.workflows) {
    html += `<div class="detail-section">
      <div class="detail-section-title">工作流</div>
      <div class="tag-list">`;
    comp.workflows.forEach(w => { html += `<span class="tag" style="font-size:10px">${w}</span>`; });
    html += `</div></div>`;
  }
  if (comp.slots) {
    html += `<div class="detail-section">
      <div class="detail-section-title">槽位</div>
      <div class="tag-list">`;
    comp.slots.forEach(s => { html += `<span class="tag highlight">${s}</span>`; });
    html += `</div></div>`;
  }
  if (comp.supportedPlatforms) {
    html += `<div class="detail-section">
      <div class="detail-section-title">支持平台</div>
      <div class="tag-list">`;
    comp.supportedPlatforms.forEach(p => { html += `<span class="tag">${p}</span>`; });
    html += `</div></div>`;
  }
  if (comp.keys) {
    html += `<div class="detail-section">
      <div class="detail-section-title">配置键</div>
      <div class="tag-list">`;
    comp.keys.forEach(k => { html += `<span class="tag" style="font-size:10px">${k}</span>`; });
    html += `</div></div>`;
  }
  if (comp.csvWriters) {
    html += `<div class="detail-section">
      <div class="detail-section-title">CSV 写入函数</div>
      <div class="tag-list">`;
    comp.csvWriters.forEach(w => { html += `<span class="tag" style="font-size:10px">${w}</span>`; });
    html += `</div></div>`;
  }
  if (comp.cachePath) {
    html += `<div class="detail-section">
      <div class="detail-section-title">缓存路径</div>
      <div class="tag-list"><span class="tag highlight">${comp.cachePath}</span></div>
    </div>`;
  }
  if (comp.outputDir) {
    html += `<div class="detail-section">
      <div class="detail-section-title">输出目录</div>
      <div class="tag-list"><span class="tag">${comp.outputDir}</span></div>
    </div>`;
  }

  detail.innerHTML = html;
}

// ── Tabs ──
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + id));
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

// ── Layer toggle ──
function toggleLayer(id) {
  document.getElementById('layer-' + id).classList.toggle('collapsed');
}

// ── Scroll to layer ──
function scrollToLayer(id) {
  switchTab('arch');
  const el = document.getElementById('layer-' + id);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Init ──
renderSidebar();
renderArch();
renderFlow();
renderPlatforms();
renderServices();
</script>
</body>
</html>

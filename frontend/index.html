<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞品分析</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-shell">
    <main class="workspace">
      <section class="composer-panel">
        <div class="panel-heading">
          <h2>发起分析</h2>
          <p>示例：帮我看一下 Blackview 的竞品，然后补充 Amazon 和数量。</p>
        </div>

        <form id="chat-form" class="composer" novalidate>
          <label class="composer-label" for="message-input">对话内容</label>
          <textarea
            id="message-input"
            name="message"
            rows="4"
            placeholder="帮我看一下 Blackview 的竞品"
            required
          ></textarea>
          <div class="composer-actions">
            <p id="form-status" class="form-status" aria-live="polite">正在创建会话...</p>
            <button id="submit-button" type="submit">发送消息</button>
          </div>
        </form>
      </section>

      <section class="conversation-panel" aria-label="任务结果">
        <ol id="message-list" class="message-list" aria-live="polite" aria-label="Chat messages"></ol>
      </section>
    </main>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
